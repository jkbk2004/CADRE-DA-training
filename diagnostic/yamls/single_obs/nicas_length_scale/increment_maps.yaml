vars:
  - T_inc
  - sphum_inc
  - u_inc
  - v_inc

levels:
  - 126
  - 75

zonal_mean:
  enabled: true
  full_vertical: true

experiments:
  - name: ctrl
    prefix: "/work2/noaa/epic-explorer/cadre2026/single_obs/cadre26.ctrl/output/ufsda.t00z.atminc.cubed_sphere_grid.tile"

  - name: nicas_length_scale
    prefix: "/work2/noaa/epic-explorer/cadre2026/single_obs/cadre26.nicas_length_scale/output/ufsda.t00z.atminc.cubed_sphere_grid.tile"

grid:
  prefix: "/work2/noaa/epic/CADRE2026/grid/C96_grid.tile"

output_dir: "./single_obs/nicas_length_scale/inc_plots"

amplify:
  enabled: true
  factor: 4.0
  apply_to_diff: true

zoom:
  enabled: true
  lat_min: -20
  lat_max: 20
  lon_min: -140
  lon_max: -100
  
