output_dir: "./day3_atms_thinning/obs-diag"

# Shared prefix for all diag files
prefix_root: "/work2/noaa/epic-explorer/cadre2026/cadre26.8896479.day3_atms_thinning/output"

observations:

  # ------------------------------------------------------------
  # ATMS Radiances
  # ------------------------------------------------------------
  - label: ATMS
    type: atms
    variable: brightnessTemperature
    file: "diag.atms_n20_2024022400.nc"
    diagnostics:
      hist: true
      stats: true
      extended: true
      scanpos: true
      latbins: true
      #scatter_map: false
      #scatter_map_channels: [1, 2]     

  # ------------------------------------------------------------
  # GNSSRO Bending Angle (scalar)
  # ------------------------------------------------------------
  - label: GNSSRO
    type: scalar
    variable: bendingAngle
    file: "diag.gnssro_cosmic2_2024022400.nc"
    diagnostics:
      hist: true

  # ------------------------------------------------------------
  # SATWND Vector Winds (QC1)
  # ------------------------------------------------------------
  - label: SATWND
    type: vector
    variable: windSpeed
    file: "diag.satwnd.abi_goes-16_2024022400.nc"
    diagnostics:
      hist: true

  # ------------------------------------------------------------
  # SCATWND Vector Winds (QC1)
  # ------------------------------------------------------------
  - label: SCATWND
    type: vector
    variable: windSpeed
    file: "diag.scatwnd.ascat_metop-b_2024022400.nc"
    diagnostics:
      hist: true

  # ------------------------------------------------------------
  # Conventional Surface Pressure (scalar)
  # ------------------------------------------------------------
  - label: CONVENTIONAL_PS
    type: scalar
    variable: stationPressure
    file: "diag.conventional_ps_2024022400.nc"
    diagnostics:
      hist: true
